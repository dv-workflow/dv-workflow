# GitHub Actions: Quality Gate
# Chạy lint + test tự động trên mỗi Pull Request.
#
# Setup:
#   1. Copy file này vào .github/workflows/ của project
#   2. Cập nhật phần "Customize" bên dưới theo stack của project
#   3. Commit và push — GitHub Actions sẽ tự chạy trên PR tiếp theo
#
# Tích hợp với dv-workflow-kit:
#   - Quality gate này là CI equivalent của pre-commit-gate.sh
#   - Khi flag pre_commit_tests/pre_commit_lint = true trong config,
#     khuyến khích có pipeline này để enforce tự động

name: Quality Gate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  quality-gate:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ========================================================================
      # Customize: Thay đổi theo tech stack của project
      # ========================================================================

      # Node.js / TypeScript / JavaScript
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'               # hoặc 'yarn', 'pnpm'

      - name: Install dependencies
        run: npm ci                  # hoặc yarn install --frozen-lockfile

      - name: Lint
        run: npm run lint            # hoặc npx eslint src/

      - name: Type check
        run: npm run typecheck       # hoặc npx tsc --noEmit
        continue-on-error: false

      - name: Run tests
        run: npm test -- --coverage  # Jest / Vitest

      - name: Check coverage threshold
        run: |
          # Tùy chỉnh threshold theo project
          echo "Coverage check passed"

      # Python (bỏ comment nếu dùng Python)
      # - name: Setup Python
      #   uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.11'
      # - run: pip install -r requirements.txt
      # - run: flake8 src/
      # - run: pytest --cov=src tests/

      # ========================================================================

      - name: Check for debug code
        run: |
          # Kiểm tra debug code còn sót (tương tự pre-commit-gate.sh)
          if git diff origin/main...HEAD | grep -E "^\+(.*)(console\.log\(|debugger|pdb\.set_trace)" | grep -v "^++" ; then
            echo "WARNING: Debug code found in PR"
            exit 1
          fi
          echo "No debug code found"

      - name: Check for sensitive patterns
        run: |
          if git diff origin/main...HEAD | grep -iE "^\+(.*)(password|secret|api_key)\s*=\s*['\"][^'\"]{8,}" | grep -v "^++" ; then
            echo "FAIL: Possible sensitive data in PR"
            exit 1
          fi
          echo "No sensitive patterns found"

